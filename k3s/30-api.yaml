apiVersion: apps/v1
kind: Deployment
metadata:
  name: warmth-api
  namespace: warmth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: warmth-api
  template:
    metadata:
      labels:
        app: warmth-api
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: tier
                    operator: In
                    values: ["primary", "backup"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: warmth-api
      imagePullSecrets:
        - name: ghcr-pull
      # Pin postgres-warmth-svc to its Service ClusterIP so we bypass
      # cluster DNS (CoreDNS endpoints include a remote replica on the
      # tw1.ru control-plane; lookups that hit it across the WAN overlay
      # can time out under load). The ClusterIP is stable across pod
      # reschedules — kube-proxy handles the routing.
      hostAliases:
        - ip: 10.43.5.36
          hostnames:
            - postgres-warmth-svc
      # Outbound name resolution (Google/Apple key servers for token
      # verification, Expo push) also goes through the flaky CoreDNS path and
      # intermittently fails with EAI_AGAIN — half of social logins failed when
      # they landed on a pod whose CoreDNS lookup timed out. Add public
      # resolvers as fallback (ClusterFirst keeps CoreDNS first for in-cluster).
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8
      containers:
        - name: api
          image: ghcr.io/darkarchonful/warmth-api:v31
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
            - name: APP_VERSION
              value: "v31"
            - name: APPLE_BUNDLE_ID
              value: "com.dbtvault.warmth"
            # TODO: remove before public launch — testing bypass for daily cap
            - name: DISABLE_SWIPE_LIMIT
              value: "1"
            # Re-pair cooldown in hours; 0 = disabled for testing/App Review.
            # TODO: set to 48 post-launch to restore anti-churn protection.
            - name: REPAIR_COOLDOWN_HOURS
              value: "0"
            # App Store review demo logins: these emails skip email send and
            # accept DEMO_CODE as a fixed login code (comma-separated allowlist —
            # reviewer account + partner, so matching can be tested across two
            # devices). TODO: remove post-launch.
            - name: DEMO_EMAIL
              value: "appreview@warmth.dbtvault-solutions.tech,appreview.partner@warmth.dbtvault-solutions.tech"
            - name: DEMO_CODE
              value: "473829"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: warmth-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: postgres://warmth:$(POSTGRES_PASSWORD)@postgres-warmth-svc:5432/warmth
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: warmth-secrets
                  key: jwt-secret
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: warmth-secrets
                  key: google-client-id
            - name: GOOGLE_IOS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: warmth-secrets
                  key: google-ios-client-id
            # Passwordless email login: 6-digit codes sent via Resend's HTTPS
            # API (Hetzner blocks outbound SMTP, so nodemailer/Gmail can't work
            # from the cluster). Branded sender on a dedicated subdomain.
            - name: MAIL_FROM
              value: "Warmth <noreply@warmth.dbtvault-solutions.tech>"
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: warmth-secrets
                  key: resend-api-key
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: warmth-api
  namespace: warmth
spec:
  type: NodePort
  selector:
    app: warmth-api
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
