apiVersion: apps/v1
kind: Deployment
metadata:
  name: warmth-api
  namespace: warmth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: warmth-api
  template:
    metadata:
      labels:
        app: warmth-api
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: tier
                    operator: In
                    values: ["primary", "backup"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: warmth-api
      imagePullSecrets:
        - name: ghcr-pull
      # Pin postgres-warmth to its stable StatefulSet pod IP so we don't
      # depend on cluster DNS (CoreDNS endpoints include a remote replica
      # on the tw1.ru control-plane; lookups that hit it across the WAN
      # overlay can time out under load, crashing the API pod).
      hostAliases:
        - ip: 10.42.2.39
          hostnames:
            - postgres-warmth
      containers:
        - name: api
          image: ghcr.io/darkarchonful/warmth-api:v8
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
            - name: APP_VERSION
              value: "v8"
            # TODO: remove before public launch — testing bypass for daily cap
            - name: DISABLE_SWIPE_LIMIT
              value: "1"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: warmth-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: postgres://warmth:$(POSTGRES_PASSWORD)@postgres-warmth:5432/warmth
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: warmth-secrets
                  key: jwt-secret
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: warmth-secrets
                  key: google-client-id
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: warmth-api
  namespace: warmth
spec:
  type: NodePort
  selector:
    app: warmth-api
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
