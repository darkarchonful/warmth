apiVersion: v1
kind: Service
metadata:
  name: postgres-warmth
  namespace: warmth
spec:
  clusterIP: None
  selector:
    app: postgres-warmth
  ports:
    - port: 5432
      name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-warmth
  namespace: warmth
spec:
  serviceName: postgres-warmth
  replicas: 1
  selector:
    matchLabels:
      app: postgres-warmth
  template:
    metadata:
      labels:
        app: postgres-warmth
    spec:
      nodeSelector:
        tier: primary
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: warmth
            - name: POSTGRES_USER
              value: warmth
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: warmth-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-sql
          configMap:
            name: warmth-init-sql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
